[env:nano33ble]
platform = nordicnrf52
board = nano33ble
framework = arduino

monitor_speed = 115200

lib_deps =
    arduino-libraries/ArduinoBLE
    Arduino_LSM9DS1

; SimonBLE — A gesture-controlled Simon Says game for Arduino Nano 33 BLE Sense
; Uses:
;   - LSM9DS1 IMU (accelerometer) for tilt gesture input
;   - Onboard RGB LED (LED_RED, LED_GREEN, LED_BLUE) for color display
;   - Buzzer on D10 for sound effects
;   - ArduinoBLE for smartphone companion app / two-player mode

